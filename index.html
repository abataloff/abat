<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>abat - Strategy Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; color: #eee; font-family: system-ui, sans-serif; }
    #app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; position: relative; }
    #status-bar { width: 100%; padding: 8px 16px; display: flex; align-items: center; justify-content: center; gap: 24px; background: #0f0f23; border-bottom: 1px solid #2a2a4a; min-height: 44px; flex-shrink: 0; }
    .status-player { display: flex; align-items: center; gap: 6px; font-size: 0.95rem; }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .status-eliminated { opacity: 0.3; text-decoration: line-through; }
    .status-turn { font-weight: bold; font-size: 1rem; margin-right: 12px; opacity: 0.7; }
    #board-area { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
    canvas#game { display: block; }
    #overlay { position: absolute; inset: 0; pointer-events: none; }
    #overlay > * { pointer-events: auto; }
    button:hover:not(:disabled) { filter: brightness(1.2); }
    button:active:not(:disabled) { transform: scale(0.97); }
  </style>
</head>
<body>
  <div id="app">
    <div id="status-bar"></div>
    <div id="board-area">
      <canvas id="game"></canvas>
      <div id="overlay"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
