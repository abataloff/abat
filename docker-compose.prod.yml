services:
  abat:
    image: ghcr.io/abataloff/abat:latest
    container_name: abat
    restart: unless-stopped
    ports:
      - "${PORT:-8051}:8051"
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/abat.db
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - BASE_URL=${BASE_URL}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      # Вход через Google выключен по умолчанию (запрет OAuth в РФ).
      # Чтобы вернуть - выставить GOOGLE_AUTH_ENABLED=1 и пересоздать контейнер.
      - GOOGLE_AUTH_ENABLED=${GOOGLE_AUTH_ENABLED:-0}
